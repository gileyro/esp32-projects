; Projekt: repeater — rozszerzenie zasięgu WiFi przez łańcuch węzłów ESP32-C3
; Każdy węzeł łączy się z upstream AP (router lub inny węzeł) i tworzy własny AP z NAT.
; Urządzenia końcowe (telefon, laptop) łączą się do dowolnego węzła i mają dostęp do internetu.
; Wersja: 2026-06-14 20:04

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
build_flags =
    -D CONFIG_LWIP_IP_FORWARD=1
    -D CONFIG_LWIP_IPV4_NAPT=1
